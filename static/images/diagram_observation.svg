<svg viewBox="0 0 300 145" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Page sections illuminated by extraction beams, with results synthesized into a task summary">
  <defs>
    <linearGradient id="beamGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e63946" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#e63946" stop-opacity="0.55" />
    </linearGradient>
    <linearGradient id="infoFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef9e0" />
      <stop offset="100%" stop-color="#fde68a" />
    </linearGradient>
    <linearGradient id="summaryFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#5b21b6" />
    </linearGradient>
    <filter id="pageShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1.5" dy="2.5" stdDeviation="2" flood-opacity="0.22" />
    </filter>
    <filter id="boxShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="1.6" flood-opacity="0.22" />
    </filter>
  </defs>

  <!-- =========================== -->
  <!-- Page wireframe (left)       -->
  <!-- =========================== -->

  <!-- Page background (drop shadow) -->
  <rect x="8" y="8" width="84" height="100" fill="#ffffff" filter="url(#pageShadow)" />

  <!-- Header (highlighted) -->
  <rect x="8" y="8" width="84" height="17" fill="#e8edf3" />
  <rect x="8" y="8" width="84" height="17" fill="#e63946" fill-opacity="0.18" />
  <!-- magnifying glass -->
  <circle cx="18" cy="16.5" r="3.2" fill="none" stroke="#64748b" stroke-width="1.15" />
  <line x1="20.4" y1="18.9" x2="23.5" y2="22" stroke="#64748b" stroke-width="1.3" stroke-linecap="round" />
  <!-- searchbar -->
  <rect x="29" y="12" width="58" height="10" rx="5" fill="none" stroke="#64748b" stroke-width="1.15" />
  <rect x="8" y="8" width="84" height="17" fill="none" stroke="#475569" stroke-width="1.5" />

  <!-- Sidebar -->
  <rect x="8" y="25" width="22" height="69" fill="#e8edf3" />
  <line x1="12" y1="34" x2="28" y2="34" stroke="#64748b" stroke-width="1.15" stroke-linecap="round" />
  <line x1="12" y1="45" x2="28" y2="45" stroke="#64748b" stroke-width="1.15" stroke-linecap="round" />
  <line x1="12" y1="56" x2="28" y2="56" stroke="#64748b" stroke-width="1.15" stroke-linecap="round" />
  <line x1="12" y1="67" x2="28" y2="67" stroke="#64748b" stroke-width="1.15" stroke-linecap="round" />
  <line x1="12" y1="78" x2="28" y2="78" stroke="#64748b" stroke-width="1.15" stroke-linecap="round" />
  <line x1="12" y1="89" x2="28" y2="89" stroke="#64748b" stroke-width="1.15" stroke-linecap="round" />
  <rect x="8" y="25" width="22" height="69" fill="none" stroke="#475569" stroke-width="1.5" />

  <!-- Main content (highlighted) -->
  <rect x="30" y="25" width="62" height="69" fill="#e8edf3" />
  <rect x="30" y="25" width="62" height="69" fill="#e63946" fill-opacity="0.18" />
  <!-- image placeholder with mountain -->
  <rect x="36" y="32" width="20" height="20" fill="none" stroke="#64748b" stroke-width="1.2" />
  <line x1="38" y1="50" x2="45" y2="42" stroke="#64748b" stroke-width="1.2" stroke-linecap="round" />
  <line x1="45" y1="42" x2="54" y2="50" stroke="#64748b" stroke-width="1.2" stroke-linecap="round" />
  <!-- text lines next to image -->
  <line x1="60" y1="36" x2="88" y2="36" stroke="#64748b" stroke-width="1.15" stroke-linecap="round" />
  <line x1="60" y1="43" x2="88" y2="43" stroke="#64748b" stroke-width="1.15" stroke-linecap="round" />
  <line x1="60" y1="50" x2="82" y2="50" stroke="#64748b" stroke-width="1.15" stroke-linecap="round" />
  <!-- text lines below image -->
  <line x1="36" y1="60" x2="88" y2="60" stroke="#64748b" stroke-width="1.15" stroke-linecap="round" />
  <line x1="36" y1="68" x2="88" y2="68" stroke="#64748b" stroke-width="1.15" stroke-linecap="round" />
  <line x1="36" y1="76" x2="80" y2="76" stroke="#64748b" stroke-width="1.15" stroke-linecap="round" />
  <line x1="36" y1="84" x2="88" y2="84" stroke="#64748b" stroke-width="1.15" stroke-linecap="round" />
  <rect x="30" y="25" width="62" height="69" fill="none" stroke="#475569" stroke-width="1.5" />

  <!-- Footer -->
  <rect x="8" y="94" width="84" height="14" fill="#e8edf3" />
  <!-- left link group -->
  <line x1="14" y1="99" x2="32" y2="99" stroke="#64748b" stroke-width="1.1" stroke-linecap="round" />
  <line x1="14" y1="104" x2="26" y2="104" stroke="#64748b" stroke-width="1.1" stroke-linecap="round" />
  <!-- right link group -->
  <line x1="62" y1="99" x2="86" y2="99" stroke="#64748b" stroke-width="1.1" stroke-linecap="round" />
  <line x1="62" y1="104" x2="74" y2="104" stroke="#64748b" stroke-width="1.1" stroke-linecap="round" />
  <rect x="8" y="94" width="84" height="14" fill="none" stroke="#475569" stroke-width="1.5" />

  <!-- =========================== -->
  <!-- Extraction beams            -->
  <!-- =========================== -->
  <polygon points="92,8 92,25 145,24 145,14" fill="url(#beamGrad)" />
  <polygon points="92,25 92,94 145,61 145,51" fill="url(#beamGrad)" />

  <!-- =========================== -->
  <!-- Info boxes (light yellow)   -->
  <!-- =========================== -->
  <g filter="url(#boxShadow)">
    <rect x="145" y="10" width="60" height="16" rx="3" fill="url(#infoFill)" stroke="#ca8a04" stroke-width="1.3" />
    <rect x="145" y="48" width="60" height="16" rx="3" fill="url(#infoFill)" stroke="#ca8a04" stroke-width="1.3" />
  </g>
  <text x="175" y="21.5" font-family="sans-serif" font-size="11" font-weight="600" fill="#713f12" text-anchor="middle">header info</text>
  <text x="175" y="59.5" font-family="sans-serif" font-size="11" font-weight="600" fill="#713f12" text-anchor="middle">main info</text>

  <!-- =========================== -->
  <!-- Feeder + trunk arrows        -->
  <!-- =========================== -->
  <g stroke="#363636" fill="none" stroke-linecap="butt">
    <!-- feeders (thinner) -->
    <line x1="205" y1="18" x2="225" y2="18" stroke-width="1.5" />
    <line x1="205" y1="56" x2="225" y2="56" stroke-width="1.5" />
    <!-- trunk (thicker merged flow) -->
    <line x1="225" y1="17" x2="225" y2="113" stroke-width="2.6" />
  </g>
  <polygon points="219.5,104 230.5,104 225,114" fill="#363636" />

  <!-- =========================== -->
  <!-- Task summary (deep purple)  -->
  <!-- =========================== -->
  <g filter="url(#boxShadow)">
    <rect x="160" y="113" width="130" height="25" rx="4" fill="url(#summaryFill)" stroke="#4c1d95" stroke-width="1.5" />
  </g>
  <text x="225" y="130" font-family="sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">task summary</text>
</svg>
