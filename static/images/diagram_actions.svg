<svg viewBox="0 0 300 145" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Two compound action examples: a partially filled form with arrows showing fill sequence, and a menu with arrows showing open-then-select sequence">
  <defs>
    <linearGradient id="panelFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f3f6fa" />
    </linearGradient>
    <linearGradient id="fieldFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </linearGradient>
    <linearGradient id="headerFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f1f5f9" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </linearGradient>
    <linearGradient id="buttonFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e5e7eb" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>
    <filter id="boxShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1.2" dy="2" stdDeviation="1.6" flood-opacity="0.22" />
    </filter>
    <marker id="greenArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#16a34a" />
    </marker>
    <!-- Arrow pointer cursor (tip at 0,0) -->
    <g id="cursor">
      <path d="M 0 0 L 0 11 L 3 8.5 L 5.5 12.5 L 7 11.8 L 4.5 8 L 8.5 8 Z"
            fill="#ffffff" stroke="#111827" stroke-width="1" stroke-linejoin="round" />
    </g>
    <!-- Pencil icon (tip at 0,0, body extends up-right) -->
    <g id="pencil">
      <polygon points="0,0 3,-3 11,-11 13,-9 5,-1"
               fill="#ffffff" stroke="#111827" stroke-width="1" stroke-linejoin="round" />
      <line x1="8.5" y1="-8.5" x2="10.5" y2="-6.5" stroke="#111827" stroke-width="0.9" />
    </g>
  </defs>

  <!-- =========================== -->
  <!-- Form panel (left)           -->
  <!-- =========================== -->

  <rect x="20" y="14" width="110" height="96" rx="3" fill="url(#panelFill)" stroke="#475569" stroke-width="1.5" filter="url(#boxShadow)" />

  <!-- Field 1 (filled) -->
  <rect x="28" y="22" width="80" height="14" rx="2" fill="url(#fieldFill)" stroke="#94a3b8" stroke-width="1.2" />
  <line x1="33" y1="29" x2="83" y2="29" stroke="#64748b" stroke-width="1.7" stroke-linecap="round" />

  <!-- Field 2 (filled) -->
  <rect x="28" y="44" width="80" height="14" rx="2" fill="url(#fieldFill)" stroke="#94a3b8" stroke-width="1.2" />
  <line x1="33" y1="51" x2="73" y2="51" stroke="#64748b" stroke-width="1.7" stroke-linecap="round" />

  <!-- Field 3 (empty) -->
  <rect x="28" y="66" width="80" height="14" rx="2" fill="url(#fieldFill)" stroke="#94a3b8" stroke-width="1.2" />

  <!-- Submit button -->
  <rect x="55" y="89" width="40" height="14" rx="2.5" fill="url(#buttonFill)" stroke="#475569" stroke-width="1.3" />
  <text x="75" y="99" font-family="sans-serif" font-size="9" font-weight="600" fill="#1f2937" text-anchor="middle">submit</text>

  <!-- Green action arrows -->
  <g fill="none" stroke="#16a34a" stroke-width="1.8" stroke-linecap="round">
    <!-- Arrow 1: pencil 1 → pencil 2 (wider arc, shifted right) -->
    <path d="M 113 36 Q 134 42 110 47" marker-end="url(#greenArrow)" />
    <!-- Arrow 2: pencil 2 → submit cursor -->
    <path d="M 113 58 Q 132 82 86 91" marker-end="url(#greenArrow)" />
  </g>

  <!-- Action indicators (pencils for input, cursor for click) -->
  <use href="#pencil" x="96" y="28" />
  <use href="#pencil" x="96" y="50" />
  <use href="#cursor" x="78" y="93" />

  <!-- Caption -->
  <text x="75" y="133" font-family="sans-serif" font-size="12" font-weight="500" fill="#2a3340" text-anchor="middle">form submission</text>

  <!-- =========================== -->
  <!-- Menu panel (right)          -->
  <!-- =========================== -->

  <rect x="170" y="14" width="110" height="96" rx="3" fill="url(#panelFill)" stroke="#475569" stroke-width="1.5" filter="url(#boxShadow)" />

  <!-- Menu header -->
  <path d="M 170 14 L 280 14 L 280 32 L 170 32 Z" fill="url(#headerFill)" stroke="#475569" stroke-width="1.5" />
  <text x="182" y="26" font-family="sans-serif" font-size="11" font-weight="500" fill="#374151">menu</text>
  <path d="M 256 21 L 261 26 L 266 21" fill="none" stroke="#374151" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Menu items (lines blue to suggest links) -->
  <circle cx="180" cy="44" r="1.7" fill="#64748b" />
  <line x1="187" y1="44" x2="240" y2="44" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" />

  <circle cx="180" cy="60" r="1.7" fill="#64748b" />
  <line x1="187" y1="60" x2="248" y2="60" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" />

  <circle cx="180" cy="76" r="1.7" fill="#64748b" />
  <line x1="187" y1="76" x2="232" y2="76" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" />

  <circle cx="180" cy="92" r="1.7" fill="#64748b" />
  <line x1="187" y1="92" x2="245" y2="92" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" />

  <!-- Green action arrow: cursor 1 (header) → cursor 2 (item) -->
  <path d="M 252 30 Q 268 50 247 71" fill="none" stroke="#16a34a" stroke-width="1.8" stroke-linecap="round" marker-end="url(#greenArrow)" />

  <!-- Cursors (clicks at header and at item) -->
  <use href="#cursor" x="240" y="19" />
  <use href="#cursor" x="240" y="73" />

  <!-- Caption -->
  <text x="225" y="133" font-family="sans-serif" font-size="12" font-weight="500" fill="#2a3340" text-anchor="middle">dropdown selection</text>
</svg>
