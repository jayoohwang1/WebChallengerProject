<svg viewBox="0 0 300 145" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Site graph being saved into a persistent WebsiteMem artifact">
  <defs>
    <filter id="nodeShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.22" />
    </filter>
    <filter id="docShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="1.6" flood-opacity="0.18" />
    </filter>
    <linearGradient id="homeFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a98ef" />
      <stop offset="100%" stop-color="#2a5fbd" />
    </linearGradient>
    <linearGradient id="nodeFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#eef3fb" />
    </linearGradient>
    <linearGradient id="docFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f3f6fa" />
    </linearGradient>
  </defs>

  <!-- Graph edges (gentle curves) -->
  <g stroke="#a8b3c5" stroke-width="1.4" fill="none" stroke-linecap="round">
    <path d="M 42 32 Q 30 50 18 63" />
    <path d="M 42 32 Q 49 50 56 63" />
    <path d="M 42 32 Q 68 50 94 63" />
    <path d="M 56 76 Q 50 90 44 104" />
    <path d="M 94 76 L 94 104" />
  </g>

  <!-- Graph nodes -->
  <g filter="url(#nodeShadow)">
    <!-- Home / root node -->
    <circle cx="42" cy="25" r="8" fill="url(#homeFill)" stroke="#22529e" stroke-width="1" />
    <circle cx="42" cy="25" r="2.6" fill="#ffffff" opacity="0.92" />
    <!-- Page nodes -->
    <circle cx="18" cy="69" r="6.2" fill="url(#nodeFill)" stroke="#3273dc" stroke-width="1.8" />
    <circle cx="56" cy="69" r="6.2" fill="url(#nodeFill)" stroke="#3273dc" stroke-width="1.8" />
    <circle cx="94" cy="69" r="6.2" fill="url(#nodeFill)" stroke="#3273dc" stroke-width="1.8" />
    <circle cx="44" cy="111" r="5.2" fill="url(#nodeFill)" stroke="#3273dc" stroke-width="1.8" />
    <circle cx="94" cy="111" r="5.2" fill="url(#nodeFill)" stroke="#3273dc" stroke-width="1.8" />
  </g>

  <!-- Save arrow -->
  <g>
    <line x1="128" y1="66" x2="178" y2="66" stroke="#363636" stroke-width="1.8" stroke-linecap="round" />
    <polygon points="175,60.5 187,66 175,71.5" fill="#363636" />
    <text x="153" y="56" font-size="12" font-family="sans-serif" font-weight="500" fill="#363636" text-anchor="middle" font-style="italic">save</text>
  </g>

  <!-- Memory artifact: page with folded corner -->
  <g filter="url(#docShadow)">
    <path d="M 200 32 L 268 32 L 280 44 L 280 110 L 200 110 Z"
          fill="url(#docFill)" stroke="#363636" stroke-width="1.6" stroke-linejoin="round" />
    <path d="M 268 32 L 268 44 L 280 44"
          fill="#e4eaf2" stroke="#363636" stroke-width="1.4" stroke-linejoin="round" />
  </g>

  <!-- Document content lines -->
  <g stroke="#9fadc2" stroke-width="1.3" stroke-linecap="round">
    <line x1="210" y1="56" x2="270" y2="56" />
    <line x1="210" y1="68" x2="270" y2="68" />
    <line x1="210" y1="80" x2="270" y2="80" />
    <line x1="210" y1="92" x2="252" y2="92" />
  </g>

  <!-- Labels -->
  <g font-family="sans-serif" font-size="12" font-weight="500" fill="#2a3340" text-anchor="middle">
    <text x="55" y="134">site graph</text>
    <text x="240" y="128">WebsiteMem</text>
  </g>
</svg>
